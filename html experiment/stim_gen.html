<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Chasing Dots Recording</title>
  <script src="jspsych.js"></script>
  <script src="plugins/jspsych-html-keyboard-response.js"></script>
  <link rel="stylesheet" href="jspsych.css">
</head>
<body></body>

<script>

// === Recorder helper ===
function recordCanvas(canvas, duration, filename) {
  return new Promise((resolve) => {
    let stream = canvas.captureStream(60); // 60 fps recording
    let recorder = new MediaRecorder(stream, { mimeType: "video/webm" });
    let chunks = [];

    recorder.ondataavailable = (e) => chunks.push(e.data);
    recorder.onstop = () => {
      let blob = new Blob(chunks, { type: "video/webm" });
      let url = URL.createObjectURL(blob);

      // Trigger download
      let a = document.createElement("a");
      a.href = url;
      a.download = filename + ".webm";
      a.click();

      resolve();
    };

    recorder.start();

    // Stop after duration ms
    setTimeout(() => {
      recorder.stop();
    }, duration);
  });
}

// === Trial ===
var trialCounter = 0;

var test_trial = {
  type: 'html-keyboard-response',
  stimulus: '<canvas id="canvas"></canvas>',
  choices: jsPsych.NO_KEYS,
  on_load: function() {
    trialCounter++;

    // put your display(0) function call here
    display();

    // Start recording canvas
    let canvas = document.getElementById('canvas');
    let trialDuration = 5000; // ms (make sure this matches trial_length)
    recordCanvas(canvas, trialDuration, "trial_" + trialCounter);
  },
  on_finish: function() {
    console.log("Finished trial " + trialCounter);
  }
};

// === Run 100 repetitions ===
var procedure = {
  timeline: [test_trial],
  repetitions: 100
};

jsPsych.run([procedure]);

</script>
</html>
